name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (build, test, clippy, fmt)
    runs-on: ubuntu-latest
    container:
      image: rust:1-bookworm
    defaults:
      run:
        shell: bash
    steps:
      - name: Check out sources
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Install native build dependencies (cmake, clang)
        run: |
          apt-get update
          apt-get install -y --no-install-recommends cmake clang curl libclang-dev
          rm -rf /var/lib/apt/lists/*

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.11.8"

      - name: Ensure clippy and rustfmt are installed
        run: rustup component add clippy rustfmt

      - name: Format check (cargo fmt --check)
        run: cargo fmt --all --check

      - name: Compatibility inventory check
        run: uv run --no-project --python 3.13 tools/compat_inventory.py --check

      - name: SearXNG compare fixtures
        run: uv run --no-project --python 3.13 tools/compare_searxng.py fixtures

      - name: Build workspace
        run: cargo build --workspace --locked

      - name: Audit Rust dependencies
        run: |
          cargo install cargo-audit --locked --version 0.22.2
          cargo audit

      - name: Clippy (deny warnings)
        run: cargo clippy --workspace --all-targets --locked -- -D warnings

      - name: Test workspace (incl. conformance + property tests)
        run: cargo test --workspace --locked

  client:
    name: Client (lint, test, build)
    runs-on: ubuntu-latest
    steps:
      - name: Check out sources
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: "1.3.14"

      - name: Install, lint, test, build
        run: |
          set -euo pipefail
          mkdir -p zoeken/zoeken-server/assets
          cp -f logo/zoeken-logo.svg zoeken/zoeken-server/assets/zoeken-logo.svg
          cd zoeken-client
          bun install --frozen-lockfile
          bun audit
          bun run check
          bun run test
          bun run build
          cd ..
          cp -f logo/zoeken-logo.svg zoeken/zoeken-server/assets/zoeken-logo.svg
          test -f zoeken/zoeken-server/assets/index.html

  image:
    name: Image (build + liveness check)
    runs-on: ubuntu-latest
    needs: [backend, client]
    steps:
      - name: Check out sources
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Set up Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Build runtime image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: .
          file: ./Dockerfile
          load: true
          tags: zoeken:ci
          cache-from: type=gha,scope=ci-image
          cache-to: type=gha,mode=max,scope=ci-image

      - name: Run container and check application routes
        run: |
          set -euo pipefail
          docker run -d --name zoeken-ci \
            -e APP_BIND_ADDRESS=0.0.0.0 \
            -e APP_SECRET_KEY=ci-liveness-check-secret-ok-16 \
            -p 8888:8888 \
            zoeken:ci

          ok=""
          for attempt in $(seq 1 30); do
            if curl -fsS http://localhost:8888/healthz; then
              ok="yes"
              break
            fi
            echo "Attempt ${attempt}: /healthz not ready yet, retrying..."
            sleep 2
          done

          if [ -z "${ok}" ]; then
            echo "::error::Liveness probe failed: /healthz did not respond successfully"
            docker logs zoeken-ci || true
            exit 1
          fi

          curl -fsS http://localhost:8888/readyz | grep -q '"status":"ready"'
          curl -fsS http://localhost:8888/config | grep -q '"instance_name"'
          curl -sS -D /tmp/clear-headers -o /dev/null http://localhost:8888/clear_cookies
          grep -qi '^location: /' /tmp/clear-headers
          grep -qi '^set-cookie: preferences=.*Max-Age=0' /tmp/clear-headers

      - name: Stop container
        if: always()
        run: docker rm -f zoeken-ci || true
