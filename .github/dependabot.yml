# Keep Rust, SPA, Actions, and Docker base images current.
version: 2
updates:
  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - rust
    groups:
      rust-patches:
        applies-to: version-updates
        update-types:
          - patch

  - package-ecosystem: npm
    directory: /zoeken-client
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - frontend
    groups:
      frontend-patches:
        applies-to: version-updates
        update-types:
          - patch
      tanstack:
        patterns:
          - "@tanstack/*"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - ci

  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - docker
