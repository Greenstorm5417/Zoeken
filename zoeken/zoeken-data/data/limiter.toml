[botdetection]
trusted_proxies = ["127.0.0.0/8", "::1/128"]
ipv4_prefix = 32
ipv6_prefix = 48
state_capacity = 100000
state_idle_seconds = 3600

[botdetection.ip_limit]
filter_link_local = false
link_token = false

[botdetection.ip_lists]
pass_ip = []
block_ip = []
pass_searxng_org = false
pass_cloudflare = false
pass_residential = false
block_proxy = false
